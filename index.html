<!doctype html>

<head>
<meta charset="utf-8">
<title>Dashboard KPIs — Operación y Calidad del Servicio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="styles.css?v=1778972720684">
</head>
<body>
  <div id="viewport">
    <div id="stage">
      <div id="root"></div>
    </div>
  </div>

  <script>
    // Auto-scale 1920×1080 stage to fit any viewport, letterbox on bg
    (function() {
      const STAGE_W = 1920, STAGE_H = 1080;
      const stage = document.getElementById('stage');
      const viewport = document.getElementById('viewport');
      function fit() {
        const vw = window.innerWidth, vh = window.innerHeight;
        const scale = Math.min(vw / STAGE_W, vh / STAGE_H);
        stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
        stage.style.transformOrigin = 'center center';
        document.documentElement.style.setProperty('--dc-inv-zoom', 1 / scale);
      }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
